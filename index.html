<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAR CONCEPT • МАКСИМАЛЬНЫЙ ОСМОТР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffaa00;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ffaa00;
            backdrop-filter: blur(10px);
            z-index: 100;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 30px #ffaa00;
            letter-spacing: 2px;
        }
        
        #camera-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 2px solid #ffaa00;
            border-radius: 60px;
            padding: 20px 40px;
            backdrop-filter: blur(10px);
            z-index: 200;
            box-shadow: 0 0 50px #ffaa00;
            display: flex;
            gap: 30px;
        }
        
        .camera-btn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #333, #111);
            border: 3px solid #ffaa00;
            border-radius: 50%;
            color: #ffaa00;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(255,170,0,0.3);
        }
        
        .camera-btn:hover {
            transform: scale(1.1);
            background: #ffaa00;
            color: black;
            box-shadow: 0 0 40px #ffaa00;
        }
        
        .camera-btn:active {
            transform: scale(0.9);
        }
        
        #camera-label {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid #ffaa00;
            backdrop-filter: blur(5px);
            z-index: 150;
            font-size: 18px;
            letter-spacing: 1px;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s;
        }
        
        .loader-logo {
            font-size: 48px;
            color: #ffaa00;
            text-shadow: 0 0 50px #ffaa00;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .loader-bar {
            width: 400px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ff5500);
            box-shadow: 0 0 20px #ffaa00;
            transition: width 0.3s;
        }
        
        #hint {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #444;
            white-space: nowrap;
        }
        
        #coords {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #666;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader-logo">CAR CONCEPT</div>
        <div class="loader-bar">
            <div class="loader-progress" id="loader-progress"></div>
        </div>
        <div style="color: #aaa; margin-top: 20px;" id="loader-text">ЗАГРУЗКА МОДЕЛИ...</div>
    </div>

    <div id="info">🏎️ CAR CONCEPT • 360° VIEW</div>
    <div id="camera-label">ВИД: СБОКУ</div>
    
    <div id="camera-panel">
        <div class="camera-btn" id="cam-left" title="Повернуть влево">←</div>
        <div class="camera-btn" id="cam-right" title="Повернуть вправо">→</div>
        <div class="camera-btn" id="cam-up" title="Посмотреть сверху">↑</div>
        <div class="camera-btn" id="cam-down" title="Посмотреть снизу">↓</div>
        <div class="camera-btn" id="cam-reset" title="Сбросить вид">⟲</div>
        <div class="camera-btn" id="cam-zoom-in" title="Приблизить">+</div>
        <div class="camera-btn" id="cam-zoom-out" title="Отдалить">−</div>
    </div>

    <div id="hint">👆 НАЖИМАЙ КНОПКИ ДЛЯ УПРАВЛЕНИЯ КАМЕРОЙ</div>
    <div id="coords" id="coords">Угол: 0° | Высота: 0°</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

        // ========== НАСТРОЙКИ ==========
        const CAMERA_SPEED = 0.05;
        const ZOOM_SPEED = 0.5;
        const MIN_DISTANCE = 3;
        const MAX_DISTANCE = 15;
        const INIT_DISTANCE = 8;
        const INIT_ANGLE = 0;
        const INIT_HEIGHT = 0;

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080814);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 2, 8);

        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            powerPreference: "high-performance",
            alpha: false
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.quality = THREE.HighQuality;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ========== МАКСИМАЛЬНОЕ ОСВЕЩЕНИЕ ==========
        // Основной направленный свет
        const mainLight = new THREE.DirectionalLight(0xffeedd, 2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 50;
        mainLight.shadow.camera.left = -10;
        mainLight.shadow.camera.right = 10;
        mainLight.shadow.camera.top = 10;
        mainLight.shadow.camera.bottom = -10;
        mainLight.shadow.bias = -0.0001;
        scene.add(mainLight);

        // Второй направленный свет с другой стороны
        const backLight = new THREE.DirectionalLight(0x88aaff, 1);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Точечные света для подсветки деталей
        const pointLight1 = new THREE.PointLight(0xffaa88, 1, 20);
        pointLight1.position.set(3, 3, 3);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x88aaff, 1, 20);
        pointLight2.position.set(-3, 2, -3);
        scene.add(pointLight2);

        // Подсветка снизу
        const bottomLight = new THREE.PointLight(0x4466aa, 0.8);
        bottomLight.position.set(0, -2, 0);
        scene.add(bottomLight);

        // Окружающий свет
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // ========== ОКРУЖЕНИЕ МАКСИМАЛЬНОГО КАЧЕСТВА ==========
        // Пол с отражением
        const floorGeo = new THREE.CircleGeometry(20, 64);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x111122,
            roughness: 0.2,
            metalness: 0.8,
            emissive: new THREE.Color(0x030308)
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.1;
        floor.receiveShadow = true;
        scene.add(floor);

        // Зеркальный слой
        const mirrorGeo = new THREE.CircleGeometry(18, 64);
        const mirrorMat = new THREE.MeshStandardMaterial({ 
            color: 0x223344,
            roughness: 0.1,
            metalness: 0.95,
            transparent: true,
            opacity: 0.3,
            emissive: new THREE.Color(0x112233)
        });
        const mirror = new THREE.Mesh(mirrorGeo, mirrorMat);
        mirror.rotation.x = -Math.PI / 2;
        mirror.position.y = 0;
        mirror.receiveShadow = true;
        scene.add(mirror);

        // Сетка
        const gridHelper = new THREE.GridHelper(20, 40, 0x44aaff, 0x224466);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Светящиеся кольца
        const ringMaterial = new THREE.MeshStandardMaterial({
            color: 0x44aaff,
            emissive: new THREE.Color(0x113355),
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide
        });

        for (let i = 1; i <= 4; i++) {
            const ringGeo = new THREE.TorusGeometry(i * 2, 0.03, 32, 100);
            const ring = new THREE.Mesh(ringGeo, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.02;
            scene.add(ring);
        }

        // Светящиеся точки по кругу
        const dotMaterial = new THREE.MeshStandardMaterial({
            color: 0x44aaff,
            emissive: 0x224466
        });

        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * Math.PI * 2;
            const radius = 7;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8),
                dotMaterial
            );
            dot.position.set(x, 0.1, z);
            dot.castShadow = true;
            dot.receiveShadow = true;
            scene.add(dot);
            
            // Маленький светильник
            const dotLight = new THREE.PointLight(0x4466aa, 0.3, 5);
            dotLight.position.set(x, 0.5, z);
            scene.add(dotLight);
        }

        // ========== ЗАГРУЗКА CARCONCEPT ==========
        const loader = new GLTFLoader();
        let carModel = null;
        
        const loaderProgress = document.getElementById('loader-progress');
        const loaderText = document.getElementById('loader-text');
        const loadingDiv = document.getElementById('loading');

        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb',
            gltf => {
                carModel = gltf.scene;
                
                // Максимальные настройки модели
                carModel.scale.set(1.8, 1.8, 1.8);
                carModel.position.y = 0.3;
                carModel.rotation.y = Math.PI / 2;
                
                // Улучшаем материалы до максимума
                carModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        child.frustumCulled = false;
                        
                        if (child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => {
                                    m.roughness = 0.15;
                                    m.metalness = 0.95;
                                    m.emissive = new THREE.Color(0x111122);
                                    m.emissiveIntensity = 0.2;
                                    m.envMapIntensity = 1.5;
                                    if (m.color) {
                                        m.color.multiplyScalar(1.1);
                                    }
                                });
                            } else {
                                child.material.roughness = 0.15;
                                child.material.metalness = 0.95;
                                child.material.emissive = new THREE.Color(0x111122);
                                child.material.emissiveIntensity = 0.2;
                                child.material.envMapIntensity = 1.5;
                                if (child.material.color) {
                                    child.material.color.multiplyScalar(1.1);
                                }
                            }
                        }
                    }
                });
                
                scene.add(carModel);
                
                // Плавное исчезновение загрузки
                loaderProgress.style.width = '100%';
                loaderText.innerHTML = 'ГОТОВО!';
                
                setTimeout(() => {
                    loadingDiv.style.opacity = '0';
                    setTimeout(() => {
                        loadingDiv.style.display = 'none';
                    }, 1000);
                }, 500);
            },
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                loaderProgress.style.width = percent + '%';
                loaderText.innerHTML = `ЗАГРУЗКА CARCONCEPT... ${percent}%`;
            },
            (error) => {
                console.error('Ошибка:', error);
                loaderText.innerHTML = 'ОШИБКА ЗАГРУЗКИ';
                loaderProgress.style.width = '100%';
                loaderProgress.style.background = '#ff0000';
            }
        );

        // ========== УПРАВЛЕНИЕ КАМЕРОЙ ==========
        let cameraAngle = INIT_ANGLE; // Горизонтальный угол
        let cameraHeight = INIT_HEIGHT; // Вертикальный угол
        let cameraDistance = INIT_DISTANCE;
        
        const targetPosition = new THREE.Vector3(0, 0.8, 0);
        
        function updateCameraPosition() {
            // Ограничиваем высоту
            cameraHeight = Math.max(-0.8, Math.min(1.5, cameraHeight));
            
            // Рассчитываем позицию камеры
            const x = targetPosition.x + Math.sin(cameraAngle) * cameraDistance;
            const z = targetPosition.z + Math.cos(cameraAngle) * cameraDistance;
            const y = targetPosition.y + 1 + cameraHeight * 4;
            
            camera.position.set(x, y, z);
            camera.lookAt(targetPosition);
            
            // Обновляем координаты
            document.getElementById('coords').innerHTML = 
                `Угол: ${Math.round(cameraAngle * 180 / Math.PI)}° | Высота: ${Math.round(cameraHeight * 90)}°`;
            
            // Обновляем подпись
            if (cameraHeight > 0.8) {
                document.getElementById('camera-label').innerHTML = 'ВИД: СВЕРХУ';
            } else if (cameraHeight < -0.5) {
                document.getElementById('camera-label').innerHTML = 'ВИД: СНИЗУ';
            } else {
                document.getElementById('camera-label').innerHTML = 'ВИД: СБОКУ';
            }
        }

        // ========== ОБРАБОТЧИКИ КНОПОК ==========
        document.getElementById('cam-left').addEventListener('click', () => {
            cameraAngle -= CAMERA_SPEED * 10;
            updateCameraPosition();
        });

        document.getElementById('cam-right').addEventListener('click', () => {
            cameraAngle += CAMERA_SPEED * 10;
            updateCameraPosition();
        });

        document.getElementById('cam-up').addEventListener('click', () => {
            cameraHeight += CAMERA_SPEED * 5;
            updateCameraPosition();
        });

        document.getElementById('cam-down').addEventListener('click', () => {
            cameraHeight -= CAMERA_SPEED * 5;
            updateCameraPosition();
        });

        document.getElementById('cam-reset').addEventListener('click', () => {
            cameraAngle = INIT_ANGLE;
            cameraHeight = INIT_HEIGHT;
            cameraDistance = INIT_DISTANCE;
            updateCameraPosition();
        });

        document.getElementById('cam-zoom-in').addEventListener('click', () => {
            cameraDistance = Math.max(MIN_DISTANCE, cameraDistance - ZOOM_SPEED);
            updateCameraPosition();
        });

        document.getElementById('cam-zoom-out').addEventListener('click', () => {
            cameraDistance = Math.min(MAX_DISTANCE, cameraDistance + ZOOM_SPEED);
            updateCameraPosition();
        });

        // ========== КЛАВИАТУРА ==========
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': cameraAngle -= CAMERA_SPEED * 5; break;
                case 'ArrowRight': cameraAngle += CAMERA_SPEED * 5; break;
                case 'ArrowUp': cameraHeight += CAMERA_SPEED * 2.5; break;
                case 'ArrowDown': cameraHeight -= CAMERA_SPEED * 2.5; break;
                case '+': case '=': cameraDistance = Math.max(MIN_DISTANCE, cameraDistance - ZOOM_SPEED); break;
                case '-': case '_': cameraDistance = Math.min(MAX_DISTANCE, cameraDistance + ZOOM_SPEED); break;
                case '0': 
                    cameraAngle = INIT_ANGLE;
                    cameraHeight = INIT_HEIGHT;
                    cameraDistance = INIT_DISTANCE;
                    break;
                default: return;
            }
            updateCameraPosition();
            e.preventDefault();
        });

        // ========== ТАЧ-УПРАВЛЕНИЕ (ОПЦИОНАЛЬНО) ==========
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            
            const deltaX = e.touches[0].clientX - touchStartX;
            const deltaY = e.touches[0].clientY - touchStartY;
            
            cameraAngle += deltaX * 0.005;
            cameraHeight -= deltaY * 0.005;
            
            cameraHeight = Math.max(-0.8, Math.min(1.5, cameraHeight));
            
            updateCameraPosition();
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        // ========== АНИМАЦИЯ ==========
        function animate() {
            requestAnimationFrame(animate);

            // Если модель загружена, можно добавить лёгкое покачивание
            if (carModel) {
                // Здесь можно добавить эффекты
            }

            renderer.render(scene, camera);
        }

        // Начальная позиция камеры
        updateCameraPosition();
        animate();

        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Блокируем скролл
        document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
